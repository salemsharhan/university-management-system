<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height: 1.5; color: #1a1a1a; max-width: 32rem; margin: 0 auto; padding: 1.5rem;">
    <h2 style="margin: 0 0 0.75rem; font-size: 1.25rem;">Your verification code</h2>
    <p style="margin: 0 0 1rem; font-size: 0.95rem;">
      Enter this 6-digit code on the registration page. It works in any browser or device — you do not need to open the link on the same computer.
    </p>
    <p
      style="
        margin: 0 0 1.25rem;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: 0.35em;
        font-variant-numeric: tabular-nums;
      "
    >
      {{ .Token }}
    </p>
    <p style="margin: 0 0 0.5rem; font-size: 0.85rem; color: #555;">
      This code expires after a while. If you did not request it, you can ignore this email.
    </p>
    <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 1.25rem 0;" />
  </body>
</html>
